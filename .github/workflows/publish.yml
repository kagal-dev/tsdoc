name: Publish to NPM

on:
  push:
    tags:
      - '@*/*@[0-9]*'

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Publish ${{ github.ref_name }}
        run: pnpm --fail-if-no-match --filter "${TAG%@*}" publish:maybe --provenance --no-git-checks
        env:
          TAG: ${{ github.ref_name }}
